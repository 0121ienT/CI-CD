<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">CI/CD pipeline</title>
  <desc id="desc">A CI/CD pipeline moving from commit to build, test, package, deploy, and monitor.</desc>
  <rect width="1200" height="800" rx="44" fill="#eef6f6"/>
  <path d="M120 390 C250 210 400 210 540 390 S850 570 1080 390" fill="none" stroke="#b5cad4" stroke-width="16" stroke-linecap="round"/>
  <g font-family="Inter,Arial,sans-serif" font-weight="900" text-anchor="middle">
    <g transform="translate(150 305)">
      <circle cx="60" cy="60" r="58" fill="#14213d"/><text x="60" y="70" font-size="21" fill="#fff">Commit</text>
    </g>
    <g transform="translate(315 220)">
      <circle cx="60" cy="60" r="58" fill="#007f7a"/><text x="60" y="70" font-size="23" fill="#fff">Build</text>
    </g>
    <g transform="translate(480 305)">
      <circle cx="60" cy="60" r="58" fill="#f08a24"/><text x="60" y="70" font-size="25" fill="#fff">Test</text>
    </g>
    <g transform="translate(645 390)">
      <circle cx="60" cy="60" r="58" fill="#6a4c93"/><text x="60" y="70" font-size="21" fill="#fff">Package</text>
    </g>
    <g transform="translate(810 305)">
      <circle cx="60" cy="60" r="58" fill="#2f6fdd"/><text x="60" y="70" font-size="23" fill="#fff">Deploy</text>
    </g>
    <g transform="translate(975 220)">
      <circle cx="60" cy="60" r="58" fill="#1c7c54"/><text x="60" y="70" font-size="20" fill="#fff">Monitor</text>
    </g>
  </g>
  <rect x="256" y="575" width="688" height="88" rx="20" fill="#fff" stroke="#d8e2ee" stroke-width="3"/>
  <text x="600" y="628" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="900" font-size="30" fill="#14213d">Automated feedback before release</text>
</svg>
