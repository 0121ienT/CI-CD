<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">GitLab CI/CD stages</title>
  <desc id="desc">GitLab CI/CD stages, jobs, runners, environments, and approvals.</desc>
  <rect width="1200" height="800" rx="44" fill="#fff2ec"/>
  <rect x="100" y="112" width="1000" height="576" rx="34" fill="#fff" stroke="#f2d8cb" stroke-width="3"/>
  <text x="600" y="190" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="900" font-size="48" fill="#14213d">GitLab CI/CD</text>
  <g font-family="Inter,Arial,sans-serif" font-weight="850" text-anchor="middle">
    <rect x="160" y="270" width="185" height="108" rx="20" fill="#f08a24"/>
    <text x="252" y="333" font-size="27" fill="#fff">Build</text>
    <rect x="390" y="270" width="185" height="108" rx="20" fill="#007f7a"/>
    <text x="482" y="333" font-size="27" fill="#fff">Test</text>
    <rect x="620" y="270" width="185" height="108" rx="20" fill="#6a4c93"/>
    <text x="712" y="333" font-size="27" fill="#fff">Package</text>
    <rect x="850" y="270" width="185" height="108" rx="20" fill="#2f6fdd"/>
    <text x="942" y="333" font-size="27" fill="#fff">Deploy</text>
    <rect x="250" y="500" width="250" height="96" rx="18" fill="#14213d"/>
    <text x="375" y="556" font-size="26" fill="#fff">Runner</text>
    <rect x="700" y="500" width="250" height="96" rx="18" fill="#1c7c54"/>
    <text x="825" y="556" font-size="26" fill="#fff">Environment</text>
  </g>
  <g fill="none" stroke="#9aa7bd" stroke-width="6" stroke-linecap="round">
    <path d="M345 324 H390"/><path d="M575 324 H620"/><path d="M805 324 H850"/>
    <path d="M482 378 L375 500"/><path d="M712 378 L825 500"/>
  </g>
</svg>
