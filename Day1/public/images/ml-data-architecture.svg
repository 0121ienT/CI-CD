    <text x="845" y="282" font-size="19" fill="#eadfff">train · evaluate</text>
    <rect x="246" y="502" width="230" height="132" rx="22" fill="#f08a24"/>
    <text x="361" y="562" font-size="29" fill="#fff">Serving</text>
    <text x="361" y="596" font-size="19" fill="#fff3e5">API · batch score</text>
    <rect x="724" y="502" width="230" height="132" rx="22" fill="#2f6fdd"/>
    <text x="839" y="562" font-size="29" fill="#fff">Monitoring</text>
    <text x="839" y="596" font-size="19" fill="#e6efff">metrics · drift</text>
