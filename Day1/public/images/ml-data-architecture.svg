<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">ML and data system architecture</title>
  <desc id="desc">Data sources, storage, processing, training, deployment, and monitoring connected as a high-level architecture.</desc>
  <rect width="1200" height="800" rx="44" fill="#f7f4ec"/>
  <rect x="86" y="82" width="1028" height="636" rx="34" fill="#fff" stroke="#d9dfeb" stroke-width="3"/>
  <g fill="none" stroke="#9aa7bd" stroke-width="5" stroke-linecap="round">
    <path d="M235 250 H465"/>
    <path d="M465 250 H735"/>
    <path d="M735 250 H965"/>
    <path d="M600 344 V526"/>
    <path d="M348 526 H852"/>
  </g>
  <g font-family="Inter,Arial,sans-serif" font-weight="800" text-anchor="middle">
    <rect x="115" y="176" width="220" height="148" rx="22" fill="#14213d"/>
    <text x="225" y="246" font-size="30" fill="#fff">Data Sources</text>
    <text x="225" y="282" font-size="19" fill="#c7d1e2">apps · logs · files</text>
    <rect x="425" y="176" width="220" height="148" rx="22" fill="#007f7a"/>
    <text x="535" y="246" font-size="30" fill="#fff">Pipelines</text>
    <text x="535" y="282" font-size="19" fill="#d6fffb">batch · stream</text>
    <rect x="735" y="176" width="220" height="148" rx="22" fill="#6a4c93"/>
