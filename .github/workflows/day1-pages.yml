name: Deploy Slide Decks to GitHub Pages

# Workflow nay build cac slide deck trong repo va deploy len GitHub Pages.
# De workflow deploy duoc, vao repository Settings -> Pages -> Source -> GitHub Actions.
#
# Link sau khi deploy:
# - Day1: https://0121ient.github.io/CI-CD/
# - Day2: https://0121ient.github.io/CI-CD/Day2/

on:
  push:
    branches:
      - main
    paths:
      - "Day1/**"
      - "Day2/**"
      - ".github/workflows/day1-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  test:
    name: Test slide decks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        deck:
          - Day1
          - Day2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.deck }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.deck }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.deck }}
        run: npm test

  deploy:
    name: Build and deploy GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            Day1/package-lock.json
            Day2/package-lock.json

      - name: Install Day1 dependencies
        working-directory: Day1
        run: npm ci

      - name: Build Day1
        working-directory: Day1
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Install Day2 dependencies
        working-directory: Day2
        run: npm ci

      - name: Build Day2
        working-directory: Day2
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Assemble Pages artifact
        shell: bash
        run: |
          mkdir -p pages/Day2
          cp -R Day1/dist/. pages/
          cp -R Day2/dist/. pages/Day2/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
